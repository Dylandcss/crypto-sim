services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BASE_URL: ${VITE_BASE_URL:-http://localhost:5000}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
        VITE_SIGNALR_HUB_URL: ${VITE_SIGNALR_HUB_URL:-http://localhost:5000/marketHub}
    container_name: crypto-sim-frontend
    ports:
      - "5173:80"
    restart: unless-stopped
