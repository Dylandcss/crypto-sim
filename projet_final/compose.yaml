services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: formation
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pformation"]
      interval: 5s
      timeout: 3s
      retries: 30

  efmigrator:
    build:
      context: .
      dockerfile: Backend/AppCryptoSim/Dockerfile.migrator
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy

  authservice:
    build:
      context: .
      dockerfile: Backend/AppCryptoSim/AuthService/Dockerfile
    env_file:
      - .env.docker
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:5001
    expose:
      - "5001"
    depends_on:
      mysql:
        condition: service_healthy
      efmigrator:
        condition: service_completed_successfully

  marketservice:
    build:
      context: .
      dockerfile: Backend/AppCryptoSim/MarketService/Dockerfile
    env_file:
      - .env.docker
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:5002
    expose:
      - "5002"
    depends_on:
      mysql:
        condition: service_healthy
      efmigrator:
        condition: service_completed_successfully

  portfolioservice:
    build:
      context: .
      dockerfile: Backend/AppCryptoSim/PortfolioService/Dockerfile
    env_file:
      - .env.docker
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:5003
    expose:
      - "5003"
    depends_on:
      mysql:
        condition: service_healthy
      efmigrator:
        condition: service_completed_successfully

  orderservice:
    build:
      context: .
      dockerfile: Backend/AppCryptoSim/OrderService/Dockerfile
    env_file:
      - .env.docker
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:5004
    expose:
      - "5004"
    depends_on:
      mysql:
        condition: service_healthy
      efmigrator:
        condition: service_completed_successfully

  gateway:
    build:
      context: .
      dockerfile: Backend/AppCryptoSim/Gateway/Dockerfile
    env_file:
      - .env.docker
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:5000
    ports:
      - "5000:5000"
    depends_on:
      authservice:
        condition: service_started
      marketservice:
        condition: service_started
      orderservice:
        condition: service_started
      portfolioservice:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: Frontend/crypto-sim-frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      gateway:
        condition: service_started

volumes:
  mysql_data: {}